<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbf6ec" />
    <title>SoftWeek is offline</title>
    <style>
      :root {
        color-scheme: light;
        --cream: #fbf6ec;
        --paper: #fffdf8;
        --sage: #496854;
        --navy: #26313a;
        --muted: #60675f;
        --border: #e2d6c4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background: var(--cream);
        color: var(--navy);
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(100%, 520px);
        padding: 1.35rem;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--paper);
        box-shadow: 0 10px 28px rgba(60, 47, 33, 0.06);
      }
      .icon {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #e5ede2;
        color: var(--sage);
        font-weight: 900;
        font-size: 1.15rem;
      }
      h1 {
        margin: 1rem 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 10vw, 3rem);
        line-height: 1;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0.85rem 0 0;
        color: var(--muted);
        line-height: 1.6;
      }
      button {
        min-height: 46px;
        margin-top: 1rem;
        border: 1px solid var(--sage);
        border-radius: 12px;
        background: var(--sage);
        color: white;
        padding: 0.8rem 1rem;
        font: inherit;
        font-weight: 850;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">SW</div>
      <h1>SoftWeek is offline right now.</h1>
      <p>
        The mobile app shell is installed, but the planner needs a connection to load or save cloud records during beta.
        Check your connection and try again.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
